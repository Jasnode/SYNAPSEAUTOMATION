<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynapseAutomation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

        :root {
            --sidebar-width: 64px;
            --navbar-height: 58px;
            --bg-main: linear-gradient(180deg, #000000 0%, #030303 100%);
            --bg-sidebar: rgba(3, 3, 4, 0.98);
            --bg-sidebar-edge: rgba(255, 255, 255, 0.04);
            --bg-popup: rgba(8, 8, 9, 0.98);
            --bg-panel: rgba(8, 8, 9, 0.98);
            --accent: #ffffff;
            --accent-strong: #d4d4d8;
            --accent-soft: rgba(255, 255, 255, 0.06);
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.12);
            --text-main: #fafafa;
            --text-dim: #8a8a93;
            --text-muted: #5b5b63;
            --danger: #f87171;
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.5);
            --transition: all 0.24s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        .sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--bg-sidebar);
            backdrop-filter: blur(16px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 10px 8px 12px;
            gap: 10px;
            z-index: 1000;
            position: relative;
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.02);
        }

        .sidebar-rail {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
        }

        .sidebar-top {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
            flex: 1;
            width: 100%;
            min-height: 0;
        }

        .sidebar-utility {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-top: 2px;
        }

        .tab-item,
        .sidebar-action {
            position: relative;
            width: 100%;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            cursor: pointer;
            transition: var(--transition);
            background: rgba(14, 14, 16, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
            overflow: visible;
        }

        .sidebar-action {
            height: 44px;
            border-color: var(--border);
            color: var(--text-dim);
            appearance: none;
            outline: none;
        }

        .tab-item::after,
        .sidebar-action::after {
            content: attr(data-tooltip);
            position: absolute;
            left: calc(100% + 12px);
            top: 50%;
            transform: translateY(-50%) translateX(-6px);
            padding: 8px 12px;
            border-radius: 12px;
            background: rgba(7, 13, 24, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: var(--shadow-soft);
            color: var(--text-main);
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            z-index: 1100;
        }

        .tab-item:hover::after,
        .sidebar-action:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .tab-item:hover,
        .sidebar-action:hover {
            border-color: var(--border-strong);
            transform: translateY(-2px);
        }

        .tab-item.active {
            background: rgba(20, 20, 22, 0.98);
            border-color: rgba(255, 255, 255, 0.16);
            box-shadow:
                0 10px 24px rgba(0, 0, 0, 0.24),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .sidebar-action.active {
            background: rgba(20, 20, 22, 0.98);
            border-color: rgba(255, 255, 255, 0.16);
            box-shadow:
                0 10px 24px rgba(0, 0, 0, 0.24),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .tab-item.active::before {
            content: '';
            position: absolute;
            left: 5px;
            top: 50%;
            width: 3px;
            height: 16px;
            background: #ffffff;
            border-radius: 999px;
            transform: translateY(-50%);
            box-shadow: none;
        }

        .tab-item.is-pinned {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
                rgba(15, 23, 42, 0.62);
        }

        .tab-icon {
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .tab-item svg,
        .sidebar-action svg,
        .tab-item .hermes-logo-icon,
        .sidebar-action .hermes-logo-icon {
            width: 18px;
            height: 18px;
            transition: var(--transition);
        }

        .tab-item svg,
        .sidebar-action svg {
            color: var(--text-dim);
        }

        .tab-item .hermes-logo-icon,
        .sidebar-action .hermes-logo-icon {
            display: inline-block;
            background-color: currentColor;
            color: var(--text-dim);
            opacity: 0.9;
            mask: url("./assets/hermes-agent-logo.svg") no-repeat center / contain;
            -webkit-mask: url("./assets/hermes-agent-logo.svg") no-repeat center / contain;
        }

        .tab-item.active svg,
        .add-btn svg,
        .settings-btn:hover svg,
        .sidebar-action.active svg {
            color: var(--accent);
        }

        .tab-item.active .hermes-logo-icon,
        .sidebar-action:hover .hermes-logo-icon,
        .sidebar-action.active .hermes-logo-icon {
            color: var(--accent);
            opacity: 1;
        }

        .tab-item.active svg {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.12));
        }

        .tab-item.active .hermes-logo-icon {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.12));
        }

        .tab-close {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 14px;
            height: 14px;
            background: rgba(10, 10, 12, 0.96);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            opacity: 0;
            transition: var(--transition);
            color: var(--text-muted);
            border: 1px solid rgba(148, 163, 184, 0.16);
            box-shadow: 0 6px 16px rgba(2, 8, 23, 0.26);
        }

        .tab-item:hover .tab-close {
            opacity: 1;
        }

        .tab-close:hover {
            color: #fda4af;
            border-color: rgba(251, 113, 133, 0.36);
            background: rgba(24, 24, 27, 0.96);
        }

        .add-btn {
            background: rgba(14, 14, 16, 0.94);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .add-btn:hover {
            box-shadow:
                0 12px 26px rgba(0, 0, 0, 0.24),
                inset 0 1px 0 rgba(255, 255, 255, 0.12);
        }

        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }

        .navbar {
            height: var(--navbar-height);
            background: rgba(4, 4, 5, 0.92);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 22px;
            gap: 16px;
            border-bottom: 1px solid var(--border);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .address-bar {
            flex: 1;
            height: 40px;
            background: rgba(10, 10, 12, 0.96);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 0 18px;
            max-width: 860px;
            margin: 0 auto;
            transition: var(--transition);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .address-bar:focus-within {
            border-color: rgba(255, 255, 255, 0.18);
            background: rgba(16, 16, 18, 0.96);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        .address-bar input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: -0.01em;
            text-align: center;
        }

        .address-bar input::placeholder {
            color: var(--text-muted);
        }

        .webview-container {
            flex: 1;
            background: #020202;
            position: relative;
        }

        webview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        webview.active {
            display: flex;
        }

        .tab-popup {
            position: fixed;
            left: calc(var(--sidebar-width) + 14px);
            width: 320px;
            background: var(--bg-popup);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-lg);
            padding: 20px;
            display: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            z-index: 10000;
            transform-origin: left center;
            animation: popupReveal 0.24s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes popupReveal {
            from {
                opacity: 0;
                transform: scale(0.94) translateX(-12px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateX(0);
            }
        }

        .p-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 20px;
        }

        .p-url-container {
            position: relative;
            margin-bottom: 18px;
            min-height: 40px;
        }

        .p-url-display {
            color: var(--text-dim);
            font-size: 12px;
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            background: rgba(18, 18, 20, 0.88);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid transparent;
            cursor: text;
            transition: all 0.2s;
        }

        .p-url-display:hover {
            border-color: var(--border-strong);
            background: rgba(22, 22, 24, 0.98);
            color: var(--text-main);
        }

        .p-url-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 20, 22, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: var(--radius-sm);
            color: var(--text-main);
            padding: 0 14px;
            font-size: 12px;
            outline: none;
            display: none;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
            animation: inputScale 0.18s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes inputScale {
            from {
                transform: scale(0.97);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .p-tools {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
        }

        .p-tool-icon {
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 10px;
        }

        .p-tool-icon:hover {
            color: var(--accent);
            background: var(--accent-soft);
            transform: translateY(-2px);
        }

        .p-tool-icon svg {
            width: 18px;
            height: 18px;
        }

        #p-close {
            color: rgba(248, 113, 113, 0.72);
        }

        #p-close:hover {
            color: #fca5a5;
            background: rgba(248, 113, 113, 0.12);
        }

        .settings-panel {
            position: fixed;
            left: calc(var(--sidebar-width) + 10px);
            top: 10px;
            bottom: 10px;
            width: 430px;
            background: var(--bg-panel);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            z-index: 1000;
            transform: translateX(calc(-100% - 18px));
            transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1);
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(2, 8, 23, 0.45);
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .settings-panel::-webkit-scrollbar {
            display: none;
        }

        .settings-panel.open {
            transform: translateX(0);
        }

        .settings-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: rgba(8, 8, 9, 0.92);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        .settings-header h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }

        .settings-close {
            min-width: 52px;
            height: 34px;
            padding: 0 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .settings-close:hover {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-main);
        }

        .settings-content {
            padding: 20px;
        }

        .settings-section {
            margin-bottom: 28px;
        }

        .settings-section-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.16em;
            margin-bottom: 12px;
        }

        .settings-item {
            background: rgba(18, 18, 20, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .settings-item:hover {
            background: rgba(24, 24, 26, 0.96);
            border-color: rgba(255, 255, 255, 0.14);
            transform: translateY(-1px);
        }

        .settings-item-info {
            flex: 1;
        }

        .settings-item-label {
            font-size: 14px;
            color: var(--text-main);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .settings-item-desc {
            font-size: 12px;
            color: var(--text-dim);
        }

        .settings-item-action {
            margin-left: 12px;
        }

        .settings-btn-small {
            padding: 7px 14px;
            font-size: 12px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 700;
        }

        .settings-btn-primary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .settings-btn-primary:hover {
            background: rgba(255, 255, 255, 0.16);
        }

        .settings-btn-danger {
            background: rgba(248, 113, 113, 0.14);
            color: var(--danger);
            border: 1px solid rgba(248, 113, 113, 0.22);
        }

        .settings-btn-danger:hover {
            background: rgba(248, 113, 113, 0.22);
        }

        .settings-btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .settings-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .settings-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.62);
            backdrop-filter: blur(6px);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.28s ease;
        }

        .settings-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>

<body>
    <div class="settings-overlay" id="settings-overlay"></div>

    <div class="settings-panel" id="settings-panel">
        <div class="settings-header">
            <h2>系统设置</h2>
            <div class="settings-close" id="settings-close">关闭</div>
        </div>
        <div class="settings-content">
            <div class="settings-section">
                <div class="settings-section-title">进程控制</div>
                <div class="settings-item" onclick="restartAllServices()">
                    <div class="settings-item-info">
                        <div class="settings-item-label">重启所有服务</div>
                        <div class="settings-item-desc">Frontend + Supervisor + Backend + Worker + Hermes + Celery</div>
                    </div>
                    <div class="settings-item-action">
                        <button class="settings-btn-small settings-btn-primary">重启</button>
                    </div>
                </div>
                <div class="settings-item" onclick="restartBackendService()">
                    <div class="settings-item-info">
                        <div class="settings-item-label">重启后端服务</div>
                        <div class="settings-item-desc">FastAPI Backend</div>
                    </div>
                    <div class="settings-item-action">
                        <button class="settings-btn-small settings-btn-primary">重启</button>
                    </div>
                </div>
                <div class="settings-item" onclick="stopAllServices()">
                    <div class="settings-item-info">
                        <div class="settings-item-label">停止所有服务</div>
                        <div class="settings-item-desc">停止所有后端进程</div>
                    </div>
                    <div class="settings-item-action">
                        <button class="settings-btn-small settings-btn-danger">停止</button>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-section-title">数据清理</div>
                <div class="settings-item" onclick="clearMaterialsData()">
                    <div class="settings-item-info">
                        <div class="settings-item-label">清除素材数据</div>
                        <div class="settings-item-desc">删除所有本地视频素材</div>
                    </div>
                    <div class="settings-item-action">
                        <button class="settings-btn-small settings-btn-secondary">清除</button>
                    </div>
                </div>
                <div class="settings-item" onclick="clearAccountsData()">
                    <div class="settings-item-info">
                        <div class="settings-item-label">清除账号 & Cookies</div>
                        <div class="settings-item-desc">删除所有账号登录信息</div>
                    </div>
                    <div class="settings-item-action">
                        <button class="settings-btn-small settings-btn-secondary">清除</button>
                    </div>
                </div>
                <div class="settings-item" onclick="clearAllCache()">
                    <div class="settings-item-info">
                        <div class="settings-item-label">清除所有缓存</div>
                        <div class="settings-item-desc">清空临时文件和缓存</div>
                    </div>
                    <div class="settings-item-action">
                        <button class="settings-btn-small settings-btn-secondary">清除</button>
                    </div>
                </div>
                <div class="settings-item" onclick="clearVideoData()">
                    <div class="settings-item-info">
                        <div class="settings-item-label">清除视频数据</div>
                        <div class="settings-item-desc">删除所有本地视频与相关数据</div>
                    </div>
                    <div class="settings-item-action">
                        <button class="settings-btn-small settings-btn-secondary">清除</button>
                    </div>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-section-title">紧急操作</div>
                <div class="settings-item" onclick="runSystemCheck()">
                    <div class="settings-item-info">
                        <div class="settings-item-label">运行系统自检</div>
                        <div class="settings-item-desc">检查系统健康状态</div>
                    </div>
                    <div class="settings-item-action">
                        <button class="settings-btn-small settings-btn-primary">自检</button>
                    </div>
                </div>
                <div class="settings-item" onclick="exportSystemLogs()">
                    <div class="settings-item-info">
                        <div class="settings-item-label">导出系统日志</div>
                        <div class="settings-item-desc">打包下载所有日志文件</div>
                    </div>
                    <div class="settings-item-action">
                        <button class="settings-btn-small settings-btn-primary">导出</button>
                    </div>
                </div>
                <div class="settings-item" onclick="forceKillAllProcesses()">
                    <div class="settings-item-info">
                        <div class="settings-item-label">强制终止进程</div>
                        <div class="settings-item-desc">立即停止所有服务</div>
                    </div>
                    <div class="settings-item-action">
                        <button class="settings-btn-small settings-btn-danger">终止</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-rail">
            <div class="sidebar-top" id="sidebar-tabs">
                <!-- Tabs will be injected here -->
            </div>
        </div>

        <div class="sidebar-utility">
            <button class="sidebar-action add-btn" id="add-tab" type="button" title="新建会话" data-tooltip="新建会话">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"
                    stroke-linejoin="round">
                    <rect x="4" y="4" width="16" height="16" rx="4"></rect>
                    <path d="M12 8.5v7"></path>
                    <path d="M8.5 12h7"></path>
                </svg>
            </button>

            <button class="sidebar-action hermes-btn" id="hermes-dashboard-btn" type="button" title="Hermes Agent"
                data-tooltip="Hermes Agent">
                <span class="hermes-logo-icon" aria-hidden="true"></span>
            </button>

            <button class="sidebar-action settings-btn" id="settings-btn" type="button" title="系统设置"
                data-tooltip="系统设置">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.85" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M4 7h16"></path>
                    <path d="M4 12h16"></path>
                    <path d="M4 17h16"></path>
                    <circle cx="15" cy="7" r="2"></circle>
                    <circle cx="9" cy="12" r="2"></circle>
                    <circle cx="13" cy="17" r="2"></circle>
                </svg>
            </button>
        </div>
    </div>

    <div class="main-area">
        <div class="navbar">
            <div class="address-bar">
                <input type="text" id="url-bar" spellcheck="false" placeholder="输入网址或搜索内容..." />
            </div>
        </div>
        <div class="webview-container" id="webview-container">
            <!-- Webviews -->
        </div>
    </div>

    <div id="tab-popup" class="tab-popup">
        <div id="p-title" class="p-title">会话加载中...</div>

        <div class="p-url-container" id="p-url-container">
            <div id="p-url-display" class="p-url-display">https://...</div>
            <input type="text" id="p-url-input" class="p-url-input" placeholder="输入并回车访问...">
        </div>

        <div class="p-tools">
            <div class="p-tool-icon" id="p-back" title="后退">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </div>
            <div class="p-tool-icon" id="p-forward" title="前进">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </div>
            <div class="p-tool-icon" id="p-reload" title="刷新">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15">
                    </path>
                </svg>
            </div>
            <div class="p-tool-icon" id="p-copy" title="复制网址">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
            </div>
            <div style="flex-grow: 1"></div>
            <div class="p-tool-icon" id="p-close" title="关闭标签">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </div>
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>

</html>
