<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse 启动管理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0a0a0e 0%, #1a1a2e 100%);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            -webkit-app-region: drag;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #7C4DFF;
        }

        .header p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
        }

        .container {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
            animation: pulse 2s infinite;
        }

        .status-indicator.running {
            background: #4CAF50;
        }

        .status-indicator.stopped {
            background: #F44336;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .service-list {
            display: grid;
            gap: 12px;
        }

        .service-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .service-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .service-name {
            font-size: 14px;
            font-weight: 500;
        }

        .service-pid {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }

        .button-group {
            display: flex;
            gap: 24px;
            margin-top: 24px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #7C4DFF;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #6A3DE8;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-danger {
            background: #F44336;
            color: white;
        }

        .btn-danger:hover:not(:disabled) {
            background: #D32F2F;
        }

        .logs {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            padding: 16px;
            height: 200px;
            overflow-y: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-line {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 4px;
        }

        .log-line.info { color: #4CAF50; }
        .log-line.error { color: #F44336; }
        .log-line.warning { color: #FFC107; }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 Synapse Automation 启动管理器</h1>
        <p>Supervisor 进程管理控制台</p>
    </div>

    <div class="container">
        <!-- 服务状态 -->
        <div class="section">
            <div class="section-title">
                <span class="status-indicator" id="overall-status"></span>
                <span>服务状态</span>
            </div>
            <div class="service-list" id="service-list">
                <div class="service-item">
                    <div class="service-info">
                        <span class="status-indicator" id="status-backend"></span>
                        <div>
                            <div class="service-name">FastAPI 后端</div>
                            <div class="service-pid" id="pid-backend">未运行</div>
                        </div>
                    </div>
                </div>
                <div class="service-item">
                    <div class="service-info">
                        <span class="status-indicator" id="status-worker"></span>
                        <div>
                            <div class="service-name">Playwright Worker</div>
                            <div class="service-pid" id="pid-worker">未运行</div>
                        </div>
                    </div>
                </div>
                <div class="service-item">
                    <div class="service-info">
                        <span class="status-indicator" id="status-celery"></span>
                        <div>
                            <div class="service-name">Celery Worker</div>
                            <div class="service-pid" id="pid-celery">未运行</div>
                        </div>
                    </div>
                </div>
                <div class="service-item">
                    <div class="service-info">
                        <span class="status-indicator" id="status-gateway"></span>
                        <div>
                            <div class="service-name">Hermes Gateway</div>
                            <div class="service-pid" id="pid-gateway">未运行</div>
                        </div>
                    </div>
                </div>
                <div class="service-item">
                    <div class="service-info">
                        <span class="status-indicator" id="status-frontend"></span>
                        <div>
                            <div class="service-name">Next.js 前端</div>
                            <div class="service-pid" id="pid-frontend">未运行</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 控制按钮 -->
        <div class="section">
            <div class="section-title">进程控制</div>
            <div class="button-group">
                <button class="btn btn-primary" id="btn-start" onclick="startAll()">
                    <span id="start-icon">▶</span>
                    启动所有服务
                </button>
                <button class="btn btn-secondary" id="btn-restart" onclick="restartAll()" disabled>
                    <span>🔄</span>
                    重启所有服务
                </button>
                <button class="btn btn-danger" id="btn-stop" onclick="stopAll()" disabled>
                    <span>⏹</span>
                    停止所有服务
                </button>
                <button class="btn btn-primary" id="btn-launch" onclick="launchApp()" disabled>
                    <span>🚀</span>
                    启动主应用
                </button>
            </div>
        </div>

        <!-- 日志输出 -->
        <div class="section">
            <div class="section-title">运行日志</div>
            <div class="logs" id="logs">
                <div class="log-line">等待操作...</div>
            </div>
        </div>
    </div>

    <script>
        let statusCheckInterval = null;

        // 添加日志
        function addLog(message, type = 'info') {
            const logs = document.getElementById('logs');
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            const time = new Date().toLocaleTimeString();
            line.textContent = `[${time}] ${message}`;
            logs.appendChild(line);
            logs.scrollTop = logs.scrollHeight;
        }

        // 更新服务状态
        async function updateStatus() {
            try {
                const status = await window.electronAPI.supervisor.getStatus();

                // 更新各个服务
                updateServiceStatus('backend', status.backend);
                updateServiceStatus('worker', status.worker);
                updateServiceStatus('celery', status.celery);
                updateServiceStatus('gateway', status.gateway);
                updateServiceStatus('frontend', status.frontend);

                // 更新总体状态
                const allRunning = status.backend.running && status.worker.running &&
                                 status.celery.running && status.gateway.running &&
                                 status.frontend.running;
                const overallStatus = document.getElementById('overall-status');
                overallStatus.className = 'status-indicator ' + (allRunning ? 'running' : 'stopped');

                // 更新按钮状态
                document.getElementById('btn-start').disabled = allRunning;
                document.getElementById('btn-restart').disabled = !allRunning;
                document.getElementById('btn-stop').disabled = !allRunning;
                document.getElementById('btn-launch').disabled = !allRunning;

            } catch (error) {
                addLog(`获取状态失败: ${error.message}`, 'error');
            }
        }

        function updateServiceStatus(name, status) {
            const indicator = document.getElementById(`status-${name}`);
            const pidElement = document.getElementById(`pid-${name}`);

            indicator.className = 'status-indicator ' + (status.running ? 'running' : 'stopped');
            pidElement.textContent = status.running ? `PID: ${status.pid}` : '未运行';
        }

        // 启动所有服务
        async function startAll() {
            const btn = document.getElementById('btn-start');
            const icon = document.getElementById('start-icon');
            btn.disabled = true;
            icon.innerHTML = '<span class="spinner"></span>';
            addLog('启动所有服务...', 'info');

            try {
                const result = await window.electronAPI.supervisor.startAll();
                if (result.success) {
                    addLog('✅ 所有服务启动成功', 'info');
                    startStatusCheck();
                } else {
                    addLog(`❌ 启动失败: ${result.error}`, 'error');
                }
            } catch (error) {
                addLog(`❌ 启动失败: ${error.message}`, 'error');
            } finally {
                icon.textContent = '▶';
                await updateStatus();
            }
        }

        // 重启所有服务
        async function restartAll() {
            addLog('重启所有服务...', 'info');
            try {
                const result = await window.electronAPI.supervisor.restartAll();
                if (result.success) {
                    addLog('✅ 所有服务重启成功', 'info');
                } else {
                    addLog(`❌ 重启失败: ${result.error}`, 'error');
                }
            } catch (error) {
                addLog(`❌ 重启失败: ${error.message}`, 'error');
            }
            await updateStatus();
        }

        // 停止所有服务
        async function stopAll() {
            addLog('停止所有服务...', 'warning');
            try {
                const result = await window.electronAPI.supervisor.stopAll();
                if (result.success) {
                    addLog('⏹ 所有服务已停止', 'warning');
                    stopStatusCheck();
                } else {
                    addLog(`❌ 停止失败: ${result.error}`, 'error');
                }
            } catch (error) {
                addLog(`❌ 停止失败: ${error.message}`, 'error');
            }
            await updateStatus();
        }

        // 启动主应用
        async function launchApp() {
            addLog('🚀 启动主应用...', 'info');
            try {
                await window.electronAPI.supervisor.launchMainApp();
                addLog('✅ 主应用已启动', 'info');
            } catch (error) {
                addLog(`❌ 启动主应用失败: ${error.message}`, 'error');
            }
        }

        // 开始状态检查
        function startStatusCheck() {
            if (statusCheckInterval) return;
            statusCheckInterval = setInterval(updateStatus, 2000);
        }

        // 停止状态检查
        function stopStatusCheck() {
            if (statusCheckInterval) {
                clearInterval(statusCheckInterval);
                statusCheckInterval = null;
            }
        }

        // 初始化
        window.addEventListener('DOMContentLoaded', () => {
            addLog('启动管理器已就绪', 'info');
            updateStatus();
            startStatusCheck();
        });
    </script>
</body>
</html>
