name: Build Windows Tauri

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows-tauri.yml"
      - "syn_backend/biliup/tauri-app/**"
      - "syn_backend/biliup/crates/**"
      - "syn_backend/biliup/Cargo.toml"
      - "syn_backend/biliup/Cargo.lock"
  pull_request:
    paths:
      - ".github/workflows/build-windows-tauri.yml"
      - "syn_backend/biliup/tauri-app/**"
      - "syn_backend/biliup/crates/**"
      - "syn_backend/biliup/Cargo.toml"
      - "syn_backend/biliup/Cargo.lock"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync Tauri app metadata
        shell: pwsh
        run: |
          @'
          import json
          import re
          from pathlib import Path

          repo = Path(".")
          desktop_package_path = repo / "desktop-electron/package.json"
          tauri_package_path = repo / "syn_backend/biliup/tauri-app/package.json"
          tauri_config_path = repo / "syn_backend/biliup/tauri-app/src-tauri/tauri.conf.json"
          cargo_toml_path = repo / "syn_backend/biliup/tauri-app/src-tauri/Cargo.toml"

          desktop_package = json.loads(desktop_package_path.read_text(encoding="utf-8"))
          version = desktop_package["version"]

          tauri_package = json.loads(tauri_package_path.read_text(encoding="utf-8"))
          tauri_package["name"] = "synapseautomation-tauri"
          tauri_package["version"] = version
          tauri_package_path.write_text(
              json.dumps(tauri_package, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          tauri_config = json.loads(tauri_config_path.read_text(encoding="utf-8"))
          tauri_config["productName"] = "SynapseAutomation"
          tauri_config["version"] = version
          tauri_config["identifier"] = "com.synapse.automation"
          tauri_config.setdefault("app", {}).setdefault("windows", [{}])[0]["title"] = "SynapseAutomation"
          bundle = tauri_config.setdefault("bundle", {})
          resources = bundle.setdefault("resources", [])
          for resource in ("binaries/", "../../../../browsers/"):
              if resource not in resources:
                  resources.append(resource)
          tauri_config_path.write_text(
              json.dumps(tauri_config, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )

          cargo_toml = cargo_toml_path.read_text(encoding="utf-8")
          cargo_toml, version_count = re.subn(
              r'(?ms)^(\[package\]\s+.*?^version\s*=\s*)"[^"]+"',
              rf'\1"{version}"',
              cargo_toml,
              count=1,
          )
          cargo_toml, desc_count = re.subn(
              r'(?ms)^(\[package\]\s+.*?^description\s*=\s*)"[^"]*"',
              r'\1"SynapseAutomation Tauri desktop app"',
              cargo_toml,
              count=1,
          )
          cargo_toml, author_count = re.subn(
              r'(?ms)^(\[package\]\s+.*?^authors\s*=\s*)\[[^\]]*\]',
              r'\1["Laihiujin"]',
              cargo_toml,
              count=1,
          )
          if not all((version_count, desc_count, author_count)):
              raise SystemExit("Failed to update package metadata in Cargo.toml")
          cargo_toml_path.write_text(cargo_toml, encoding="utf-8")
          print(f"Synchronized Tauri metadata to version {version}")
          '@ | python -

      - name: Resolve build metadata
        id: meta
        shell: pwsh
        run: |
          $config = Get-Content "syn_backend/biliup/tauri-app/src-tauri/tauri.conf.json" | ConvertFrom-Json
          "product_name=$($config.productName)" >> $env:GITHUB_OUTPUT
          "app_version=$($config.version)" >> $env:GITHUB_OUTPUT

      - name: Verify Tauri workspace
        shell: pwsh
        run: |
          $tauriDir = Join-Path $env:GITHUB_WORKSPACE "syn_backend\biliup\tauri-app"
          if (-not (Test-Path $tauriDir)) {
            throw "Missing Tauri workspace: $tauriDir"
          }
          Get-ChildItem $tauriDir | Select-Object Name, Mode

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            syn_backend/biliup -> target
            syn_backend/biliup/tauri-app/src-tauri -> target

      - name: Install frontend dependencies
        shell: pwsh
        run: npm --prefix .\syn_backend\biliup\tauri-app ci

      - name: Install biliup web dependencies
        shell: pwsh
        run: npm --prefix .\syn_backend\biliup ci

      - name: Build biliup web assets
        shell: pwsh
        run: |
          npm --prefix .\syn_backend\biliup run build
          $webOutDir = Join-Path $env:GITHUB_WORKSPACE "syn_backend\biliup\out"
          if (-not (Test-Path $webOutDir)) {
            throw "Missing biliup web export directory: $webOutDir"
          }
          Get-ChildItem $webOutDir | Select-Object Name, Mode

      - name: Install Playwright Chromium
        shell: pwsh
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\browsers\chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install chromium
          Get-ChildItem $env:PLAYWRIGHT_BROWSERS_PATH | Select-Object Name, Mode

      - name: Build biliup sidecar
        shell: pwsh
        run: |
          cargo build --manifest-path .\syn_backend\biliup\Cargo.toml --package biliup-cli --bin biliup --release

      - name: Prepare Tauri sidecar resources
        shell: pwsh
        run: |
          $sidecarDir = Join-Path $env:GITHUB_WORKSPACE "syn_backend\biliup\tauri-app\src-tauri\binaries"
          $sourceExe = Join-Path $env:GITHUB_WORKSPACE "syn_backend\biliup\target\release\biliup.exe"
          if (-not (Test-Path $sourceExe)) {
            throw "Missing sidecar binary: $sourceExe"
          }
          New-Item -ItemType Directory -Force -Path $sidecarDir | Out-Null
          Copy-Item -LiteralPath $sourceExe -Destination (Join-Path $sidecarDir "biliup.exe") -Force
          Get-ChildItem $sidecarDir | Select-Object Name, Length

      - name: Build Tauri app
        env:
          CI: true
        shell: pwsh
        run: npm --prefix .\syn_backend\biliup\tauri-app run tauri -- build

      - name: Verify installer outputs
        shell: pwsh
        run: |
          $bundleDir = Join-Path $env:GITHUB_WORKSPACE "syn_backend\biliup\tauri-app\src-tauri\target\release\bundle"
          if (-not (Test-Path $bundleDir)) {
            throw "Missing bundle directory: $bundleDir"
          }
          Get-ChildItem $bundleDir -Recurse | Select-Object FullName, Length

      - name: Upload NSIS setup
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.product_name }}-${{ steps.meta.outputs.app_version }}-setup-exe
          path: |
            syn_backend/biliup/tauri-app/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.product_name }}-${{ steps.meta.outputs.app_version }}-setup-msi
          path: |
            syn_backend/biliup/tauri-app/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
