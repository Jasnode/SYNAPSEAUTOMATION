name: Build Windows Electron

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-windows-electron.yml"
      - "desktop-electron/**"
      - "syn_frontend_react/**"
      - "syn_backend/**"
      - "scripts/release/**"
      - "scripts/hermes/**"
      - "scripts/packaging/**"
      - "build/**"
      - "browsers/**"
      - "package.json"
      - "package-lock.json"
      - ".gitmodules"
  pull_request:
    paths:
      - ".github/workflows/build-windows-electron.yml"
      - "desktop-electron/**"
      - "syn_frontend_react/**"
      - "syn_backend/**"
      - "scripts/release/**"
      - "scripts/hermes/**"
      - "scripts/packaging/**"
      - "build/**"
      - "browsers/**"
      - "package.json"
      - "package-lock.json"
      - ".gitmodules"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CI: true
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}\browsers\chromium
      NODE_OPTIONS: --max-old-space-size=12288

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sanitize release workspace
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\release\prepare-release.ps1 -ProjectRoot $env:GITHUB_WORKSPACE

      - name: Resolve build metadata
        id: meta
        shell: pwsh
        run: |
          $desktopPackage = Get-Content "desktop-electron/package.json" -Raw | ConvertFrom-Json
          $version = $desktopPackage.version
          $buildVersion = "$version.${{ github.run_number }}"
          $releaseTag = "v$buildVersion"
          $releaseName = "SynapseAutomation $buildVersion"
          $releaseFile = "SynapseAutomation-$buildVersion-setup.exe"
          "app_version=$version" >> $env:GITHUB_OUTPUT
          "build_version=$buildVersion" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT
          "release_name=$releaseName" >> $env:GITHUB_OUTPUT
          "release_file=$releaseFile" >> $env:GITHUB_OUTPUT

      - name: Install frontend dependencies
        shell: pwsh
        run: npm --prefix .\syn_frontend_react ci --ignore-scripts

      - name: Build frontend standalone bundle
        shell: pwsh
        run: |
          $env:SYN_BACKEND_URL = "http://127.0.0.1:7000"
          $env:NEXT_PUBLIC_SYN_BACKEND_URL = "http://127.0.0.1:7000"
          $env:NEXT_PUBLIC_BACKEND_URL = "http://127.0.0.1:7000"
          $frontendDir = Join-Path $env:GITHUB_WORKSPACE "syn_frontend_react"
          $nextDir = Join-Path $frontendDir ".next"
          $serverJs = Join-Path $nextDir "standalone\server.js"
          $attemptCount = 2
          $buildSucceeded = $false

          for ($attempt = 1; $attempt -le $attemptCount; $attempt++) {
            if (Test-Path $nextDir) {
              Remove-Item -LiteralPath $nextDir -Recurse -Force -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 2
            }

            & npm --prefix .\syn_frontend_react run build
            $buildExitCode = $LASTEXITCODE
            $serverJsExists = Test-Path $serverJs

            if ($buildExitCode -eq 0 -and $serverJsExists) {
              $buildSucceeded = $true
              break
            }

            Write-Warning "Frontend standalone build attempt $attempt/$attemptCount incomplete. exit=$buildExitCode serverJsExists=$serverJsExists"
            if ($attempt -lt $attemptCount) {
              Start-Sleep -Seconds 3
            }
          }

          if (-not $buildSucceeded) {
            if (Test-Path (Join-Path $nextDir "standalone")) {
              Get-ChildItem -Path (Join-Path $nextDir "standalone") -Force | Format-Table -AutoSize | Out-String | Write-Host
            }
            throw "Missing frontend standalone output after $attemptCount attempts: $serverJs"
          }

      - name: Install Electron dependencies
        shell: pwsh
        run: npm --prefix .\desktop-electron ci

      - name: Prepare packaged synenv
        shell: pwsh
        run: |
          python -m venv .\synenv
          .\synenv\Scripts\python.exe -m pip install --upgrade pip
          .\synenv\Scripts\python.exe -m pip install -r .\requirements.txt
          .\synenv\Scripts\python.exe -m pip uninstall -y playwright patchright
          .\synenv\Scripts\python.exe -m pip install pyinstaller psutil "patchright==1.59.1"
          .\synenv\Scripts\python.exe -c "import platform, importlib.metadata; patchright_version = importlib.metadata.version('patchright'); assert patchright_version == '1.59.1', patchright_version; print(platform.python_version()); print('patchright=' + patchright_version)"

      - name: Prepare embedded Hermes runtime
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\hermes\setup-local-hermes.ps1 -Branch main -WebUIVersion v0.51.50

          $requiredHermesPaths = @(
            (Join-Path $env:GITHUB_WORKSPACE "synenv\Scripts\python.exe"),
            (Join-Path $env:GITHUB_WORKSPACE "synenv\.hermes-runtime-ready"),
            (Join-Path $env:GITHUB_WORKSPACE "tools\hermes-agent\run_agent.py"),
            (Join-Path $env:GITHUB_WORKSPACE "tools\hermes-webui\server.py"),
            (Join-Path $env:GITHUB_WORKSPACE "tools\hermes-webui\static\index.html")
          )

          foreach ($requiredPath in $requiredHermesPaths) {
            if (-not (Test-Path $requiredPath)) {
              throw "Missing embedded Hermes runtime path: $requiredPath"
            }
          }

      - name: Smoke test Electron runtime wiring
        shell: pwsh
        run: |
          node .\desktop-electron\scripts\electron-runtime-smoke.cjs

      - name: Build packaged backend service executables
        shell: pwsh
        run: |
          $env:PACKAGING_PYTHON = (Join-Path $env:GITHUB_WORKSPACE "synenv\Scripts\python.exe")
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\packaging\build_services.ps1

          $serviceDist = Join-Path $env:GITHUB_WORKSPACE "dist\services"
          $requiredServiceExes = @(
            (Join-Path $serviceDist "backend\backend.exe"),
            (Join-Path $serviceDist "playwright-worker\playwright-worker.exe"),
            (Join-Path $serviceDist "celery-worker\celery-worker.exe")
          )

          foreach ($serviceExe in $requiredServiceExes) {
            if (-not (Test-Path $serviceExe)) {
              throw "Missing packaged service executable: $serviceExe"
            }
          }

          $playwrightWorkerDir = Join-Path $serviceDist "playwright-worker"
          $patchrightNode = Join-Path $playwrightWorkerDir "_internal\patchright\driver\node.exe"
          $duplicatePlaywrightNodes = @(Get-ChildItem -Path $playwrightWorkerDir -Filter node.exe -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\playwright\\driver\\node\.exe$" })
          foreach ($duplicateNode in $duplicatePlaywrightNodes) {
            Remove-Item -LiteralPath $duplicateNode.FullName -Force
            Write-Host "Removed duplicate Playwright driver node.exe before Electron packaging: $($duplicateNode.FullName)"
          }

          if (-not (Test-Path $patchrightNode)) {
            throw "Missing packaged patchright driver node runtime before Electron packaging: $patchrightNode"
          }

          $remainingDuplicatePlaywrightNodes = @(Get-ChildItem -Path $playwrightWorkerDir -Filter node.exe -Recurse -File -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "\\playwright\\driver\\node\.exe$" })
          if ($remainingDuplicatePlaywrightNodes.Count -gt 0) {
            $remainingList = ($remainingDuplicatePlaywrightNodes | Select-Object -ExpandProperty FullName) -join ', '
            throw "Duplicate Playwright driver node.exe still present before Electron packaging: $remainingList"
          }

      - name: Install Hibbiki Chromium for packaged runtime
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\packaging\install_hibbiki_chromium.ps1 -ProjectRoot $env:GITHUB_WORKSPACE -Clean
          $chromeExe = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE "browsers\chromium") -Filter chrome.exe -Recurse |
            Where-Object { $_.FullName -match "\\hibbiki-[^\\]+\\Chrome-bin\\chrome\.exe$" } |
            Select-Object -First 1
          if (-not $chromeExe) {
            throw "Hibbiki Chromium executable was not installed under browsers\\chromium"
          }
          "chromium_path=$($chromeExe.FullName)" >> $env:GITHUB_STEP_SUMMARY
          $chromiumRoot = Join-Path $env:GITHUB_WORKSPACE "browsers\chromium"
          $chromiumBytes = (Get-ChildItem -Path $chromiumRoot -Recurse -File | Measure-Object Length -Sum).Sum
          "chromium_payload_mb=$([math]::Round($chromiumBytes / 1MB, 2))" >> $env:GITHUB_STEP_SUMMARY

      - name: Build Supervisor executable
        shell: pwsh
        run: |
          .\synenv\Scripts\python.exe -m PyInstaller .\build\supervisor.spec --clean
          $supervisorExe = Join-Path $env:GITHUB_WORKSPACE "dist\supervisor.exe"
          if (-not (Test-Path $supervisorExe)) {
            throw "Missing supervisor executable: $supervisorExe"
          }
          Copy-Item -LiteralPath $supervisorExe -Destination (Join-Path $env:GITHUB_WORKSPACE "desktop-electron\resources\supervisor\supervisor.exe") -Force

      - name: Prune packaged synenv caches and dev tools
        shell: pwsh
        run: |
          $synenv = Join-Path $env:GITHUB_WORKSPACE "synenv"
          $sitePackages = Join-Path $synenv "Lib\site-packages"
          $scriptNames = @(
            "pytest.exe", "py.test.exe", "coverage.exe", "coverage3.exe", "coverage-3.11.exe",
            "black.exe", "blackd.exe", "flake8.exe",
            "pyinstaller.exe", "pyi-archive_viewer.exe", "pyi-bindepend.exe",
            "pyi-grab_version.exe", "pyi-makespec.exe", "pyi-set_version.exe"
          )
          foreach ($scriptName in $scriptNames) {
            $scriptPath = Join-Path $synenv "Scripts\$scriptName"
            if (Test-Path $scriptPath) {
              Remove-Item -LiteralPath $scriptPath -Force
            }
          }

          if (Test-Path $sitePackages) {
            $packagePatterns = @(
              "pytest*", "coverage*", "black*", "flake8*", "pyinstaller*", "PyInstaller*",
              "altgraph*", "pefile*", "pywin32_ctypes*"
            )
            foreach ($pattern in $packagePatterns) {
              Get-ChildItem -Path $sitePackages -Recurse -Force -ErrorAction SilentlyContinue -Filter $pattern |
                Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            }
            Get-ChildItem -Path $sitePackages -Recurse -Directory -Force -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -in @("__pycache__", "tests", "test", ".pytest_cache") } |
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
            Get-ChildItem -Path $sitePackages -Recurse -File -Force -ErrorAction SilentlyContinue -Include *.pyc,*.pyo |
              Remove-Item -Force -ErrorAction SilentlyContinue
          }

          $synenvBytes = (Get-ChildItem -Path $synenv -Recurse -File -ErrorAction SilentlyContinue | Measure-Object Length -Sum).Sum
          "synenv_payload_mb=$([math]::Round($synenvBytes / 1MB, 2))" >> $env:GITHUB_STEP_SUMMARY

      - name: Build unpacked Electron app
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.app_version }}"
          $buildVersion = "${{ steps.meta.outputs.build_version }}"
          $distBuild = Join-Path $env:GITHUB_WORKSPACE "desktop-electron\dist-build"
          if (Test-Path $distBuild) {
            Remove-Item -LiteralPath $distBuild -Recurse -Force
          }
          npm --prefix .\desktop-electron run build:dir -- --config.extraMetadata.version=$version --config.buildVersion=$buildVersion

      - name: Validate packaged runtime resources
        shell: pwsh
        run: |
          $resourcesDir = Join-Path $env:GITHUB_WORKSPACE "desktop-electron\dist-build\win-unpacked\resources"
          if (-not (Test-Path $resourcesDir)) {
            throw "Missing Electron resources directory: $resourcesDir"
          }

          $requiredFiles = @(
            (Join-Path $resourcesDir "syn_backend\fastapi_app\run.py"),
            (Join-Path $resourcesDir "supervisor\supervisor.exe"),
            (Join-Path $resourcesDir "frontend\standalone\server.js"),
            (Join-Path $resourcesDir "services\backend\backend.exe"),
            (Join-Path $resourcesDir "services\playwright-worker\playwright-worker.exe"),
            (Join-Path $resourcesDir "services\celery-worker\celery-worker.exe"),
            (Join-Path $resourcesDir "synenv\Scripts\python.exe"),
            (Join-Path $resourcesDir "synenv\.hermes-runtime-ready"),
            (Join-Path $resourcesDir "tools\hermes-agent\run_agent.py"),
            (Join-Path $resourcesDir "tools\hermes-webui\server.py"),
            (Join-Path $resourcesDir "tools\hermes-webui\static\index.html"),
            (Join-Path $resourcesDir "scripts\hermes\hermes.ps1")
          )

          foreach ($required in $requiredFiles) {
            if (-not (Test-Path $required)) {
              throw "Missing packaged runtime file: $required"
            }
          }

          $pythonExe = Join-Path $resourcesDir "synenv\Scripts\python.exe"
          & $pythonExe -c "import platform, patchright; print(platform.python_version())"
          if ($LASTEXITCODE -ne 0) {
            throw "Packaged synenv Python cannot import patchright."
          }

          $allChrome = Get-ChildItem -Path (Join-Path $resourcesDir "browsers") -Filter chrome.exe -Recurse
          $allChrome | ForEach-Object { "packaged_chrome=$($_.FullName)" >> $env:GITHUB_STEP_SUMMARY }
          $chromeExe = $allChrome |
            Where-Object { $_.FullName -match "\\hibbiki-[^\\]+\\Chrome-bin\\chrome\.exe$" } |
            Select-Object -First 1
          if (-not $chromeExe) {
            throw "Missing packaged Hibbiki Chromium executable under $resourcesDir\\browsers"
          }

          $legacyBrowserDirs = Get-ChildItem -Path (Join-Path $resourcesDir "browsers\chromium") -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notmatch '^hibbiki-' }
          if ($legacyBrowserDirs) {
            $legacyNames = ($legacyBrowserDirs | Select-Object -ExpandProperty Name) -join ', '
            throw "Unexpected legacy browser payload packaged: $legacyNames"
          }

          $patchrightNode = Join-Path $resourcesDir "services\playwright-worker\_internal\patchright\driver\node.exe"
          Get-ChildItem -Path (Join-Path $resourcesDir "services\playwright-worker") -Filter node.exe -Recurse |
            ForEach-Object { "packaged_driver_node=$($_.FullName)" >> $env:GITHUB_STEP_SUMMARY }
          if (-not (Test-Path $patchrightNode)) {
            throw "Missing packaged patchright driver node runtime: $patchrightNode"
          }

          $duplicatePlaywrightNode = Join-Path $resourcesDir "services\playwright-worker\_internal\playwright\driver\node.exe"
          if (Test-Path $duplicatePlaywrightNode) {
            throw "Duplicate Playwright driver node.exe should be created at runtime, not packaged: $duplicatePlaywrightNode"
          }

          "packaged_python=$(Join-Path $resourcesDir "synenv\Scripts\python.exe")" >> $env:GITHUB_STEP_SUMMARY
          "packaged_hermes_agent=$(Join-Path $resourcesDir "tools\hermes-agent\run_agent.py")" >> $env:GITHUB_STEP_SUMMARY
          "packaged_hermes_webui=$(Join-Path $resourcesDir "tools\hermes-webui\server.py")" >> $env:GITHUB_STEP_SUMMARY

          $resourceBytes = (Get-ChildItem -Path $resourcesDir -Recurse -File | Measure-Object Length -Sum).Sum
          "resources_payload_mb=$([math]::Round($resourceBytes / 1MB, 2))" >> $env:GITHUB_STEP_SUMMARY

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ steps.meta.outputs.app_version }}"
          $buildVersion = "${{ steps.meta.outputs.build_version }}"
          $distBuild = Join-Path $env:GITHUB_WORKSPACE "desktop-electron\dist-build"
          if (Test-Path $distBuild) {
            Remove-Item -LiteralPath $distBuild -Recurse -Force
          }
          npm --prefix .\desktop-electron run build -- --config.extraMetadata.version=$version --config.buildVersion=$buildVersion
          $installer = Get-ChildItem -Path $distBuild -Filter *.exe | Select-Object -First 1
          if (-not $installer) {
            throw "No Electron installer .exe found in desktop-electron\\dist-build"
          }
          $resourcesDir = Join-Path $env:GITHUB_WORKSPACE "desktop-electron\dist-build\win-unpacked\resources"
          if (-not (Test-Path $resourcesDir)) {
            throw "Missing final win-unpacked resources directory after installer build: $resourcesDir"
          }
          $patchrightNode = Join-Path $resourcesDir "services\playwright-worker\_internal\patchright\driver\node.exe"
          $duplicatePlaywrightNode = Join-Path $resourcesDir "services\playwright-worker\_internal\playwright\driver\node.exe"
          if (-not (Test-Path $patchrightNode)) {
            throw "Missing final packaged patchright driver node runtime: $patchrightNode"
          }
          if (Test-Path $duplicatePlaywrightNode) {
            throw "Duplicate Playwright driver node.exe should not be packaged by default: $duplicatePlaywrightNode"
          }
          "installer_mb=$([math]::Round($installer.Length / 1MB, 2))" >> $env:GITHUB_STEP_SUMMARY

      - name: Prepare release executable
        shell: pwsh
        run: |
          $installer = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE "desktop-electron\dist-build") -Filter *.exe | Select-Object -First 1
          if (-not $installer) {
            throw "No Electron installer .exe found in desktop-electron\\dist-build"
          }

          $releaseDir = Join-Path $env:GITHUB_WORKSPACE ".release-assets"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          $releaseExe = Join-Path $releaseDir "${{ steps.meta.outputs.release_file }}"
          Copy-Item -LiteralPath $installer.FullName -Destination $releaseExe -Force
          "release_exe=$releaseExe" >> $env:GITHUB_OUTPUT
        id: release_asset

      - name: Ensure versioned release tag exists
        if: github.event_name != 'pull_request'
        shell: pwsh
        run: |
          $tag = "${{ steps.meta.outputs.release_tag }}"
          $existingTag = git ls-remote --tags origin "refs/tags/$tag"
          if ([string]::IsNullOrWhiteSpace($existingTag)) {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a $tag $env:GITHUB_SHA -m "Release $tag"
            git push origin "refs/tags/$tag"
            Write-Host "Created versioned release tag: $tag"
          } else {
            Write-Host "Versioned release tag already exists: $tag"
          }

      - name: Publish versioned release executable
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.meta.outputs.release_tag }}
          name: ${{ steps.meta.outputs.release_name }}
          prerelease: false
          draft: false
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: true
          commit: ${{ github.sha }}
          body: |
            Automated Windows release build from `main`.
            Version: `${{ steps.meta.outputs.app_version }}`
            Build: `${{ steps.meta.outputs.build_version }}`
            Tag: `${{ steps.meta.outputs.release_tag }}`
            Commit: `${{ github.sha }}`
          artifacts: |
            .release-assets/*.exe

      - name: Publish rolling release executable
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          tag: latest-main
          name: Latest Main Build
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          makeLatest: false
          commit: ${{ github.sha }}
          body: |
            Automated Electron Windows build from `main`.
            Version: `${{ steps.meta.outputs.build_version }}`
            Tag: `${{ steps.meta.outputs.release_tag }}`
            Commit: `${{ github.sha }}`
          artifacts: |
            .release-assets/*.exe
